name: Validate and deploy static site

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Build and verify artifact
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    outputs:
      artifact-name: ${{ steps.package.outputs.artifact-name }}
      artifact-sha256: ${{ steps.package.outputs.artifact-sha256 }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Biome
        run: bun run lint

      - name: Build static site
        run: bun run build

      - name: Assert static output
        run: bun run test:static

      - name: Run functional and visual Playwright tests
        run: bun run test:e2e:static

      - name: Run Lighthouse CI
        run: bun run lighthouse

      - name: Package verified static artifact
        id: package
        shell: bash
        run: |
          set -euo pipefail
          artifact_name="verified-static-site-${GITHUB_RUN_ID}"
          mkdir -p release
          jq -n \
            --arg runId "${GITHUB_RUN_ID}" \
            --arg commit "${GITHUB_SHA}" \
            '{runId: $runId, commit: $commit}' \
            > dist/client/release.json
          find dist/client -type f -exec touch -t 198001010000 {} +
          (
            cd dist/client
            find . -type f -print | LC_ALL=C sort > "${RUNNER_TEMP}/static-files.txt"
            zip -X -q "${GITHUB_WORKSPACE}/release/site.zip" -@ < "${RUNNER_TEMP}/static-files.txt"
          )
          (
            cd release
            sha256sum site.zip > site.zip.sha256
          )
          artifact_sha256="$(cut -d ' ' -f 1 release/site.zip.sha256)"
          jq -n \
            --arg runId "${GITHUB_RUN_ID}" \
            --arg commit "${GITHUB_SHA}" \
            --arg sha256 "${artifact_sha256}" \
            '{runId: $runId, commit: $commit, sha256: $sha256, deploymentRoot: "dist/client"}' \
            > release/metadata.json
          cp -R .lighthouseci/reports release/lighthouse-reports
          cp -R playwright-report release/playwright-report
          printf 'artifact-name=%s\n' "${artifact_name}" >> "${GITHUB_OUTPUT}"
          printf 'artifact-sha256=%s\n' "${artifact_sha256}" >> "${GITHUB_OUTPUT}"

      - name: Upload verified artifact and reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.package.outputs.artifact-name }}
          path: release/
          if-no-files-found: error
          retention-days: 30

  deploy:
    name: Verify candidate and promote
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - quality
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    environment: production
    concurrency:
      group: amplify-production-deployment
      cancel-in-progress: false
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download this run's verified artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.quality.outputs.artifact-name }}
          path: release

      - name: Verify artifact integrity
        working-directory: release
        run: |
          set -euo pipefail
          sha256sum -c site.zip.sha256
          test "$(jq -r '.sha256' metadata.json)" = "${{ needs.quality.outputs.artifact-sha256 }}"
          test "$(jq -r '.runId' metadata.json)" = "${GITHUB_RUN_ID}"

      - name: Configure AWS credentials through OIDC
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: portfolio-deploy-${{ github.run_id }}
          mask-aws-account-id: true

      - name: Deploy verified zip to candidate
        id: candidate
        env:
          AMPLIFY_APP_ID: ${{ vars.AMPLIFY_APP_ID }}
          AMPLIFY_BRANCH: ${{ vars.AMPLIFY_CANDIDATE_BRANCH }}
        run: ./scripts/amplify-deploy.sh "${AMPLIFY_APP_ID}" "${AMPLIFY_BRANCH}" release/site.zip

      - name: Smoke test candidate hosting
        env:
          HOSTING_BASE_URL: ${{ vars.AMPLIFY_CANDIDATE_URL }}
          HOSTING_EXPECT_AMPLIFY: "1"
        run: bun run test:hosting

      - name: Run Playwright acceptance against candidate
        env:
          PLAYWRIGHT_BASE_URL: ${{ vars.AMPLIFY_CANDIDATE_URL }}
        run: bun run test:e2e

      - name: Run Lighthouse acceptance against candidate
        env:
          LHCI_URL: ${{ vars.AMPLIFY_CANDIDATE_URL }}
        run: bun run lighthouse

      - name: Locate currently deployed verified artifact
        id: previous
        env:
          AMPLIFY_PRODUCTION_URL: ${{ vars.AMPLIFY_PRODUCTION_URL }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          release_marker="$(mktemp)"
          trap 'rm -f "${release_marker}"' EXIT
          if ! curl --fail --silent --show-error --max-time 20 \
            "${AMPLIFY_PRODUCTION_URL%/}/release.json" > "${release_marker}"; then
            echo "No deployed release marker exists; this is the first baseline artifact."
            echo "available=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          previous_run_id="$(jq -r '.runId' "${release_marker}")"
          previous_commit="$(jq -r '.commit' "${release_marker}")"
          [[ "${previous_run_id}" =~ ^[0-9]+$ ]]
          [[ "${previous_commit}" =~ ^[0-9a-f]{40}$ ]]

          run="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${previous_run_id}")"
          test "$(jq -r '.conclusion' <<< "${run}")" = "success"
          test "$(jq -r '.head_branch' <<< "${run}")" = "main"
          test "$(jq -r '.event' <<< "${run}")" = "push"
          test "$(jq -r '.path' <<< "${run}")" = ".github/workflows/deploy.yml"
          test "$(jq -r '.head_sha' <<< "${run}")" = "${previous_commit}"

          mkdir -p previous-release
          if ! gh run download "${previous_run_id}" \
            --repo "${GITHUB_REPOSITORY}" \
            --name "verified-static-site-${previous_run_id}" \
            --dir previous-release; then
            echo "Currently deployed run ${previous_run_id} has no retained verified artifact."
            echo "available=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          (
            cd previous-release
            sha256sum -c site.zip.sha256
            test "$(jq -r '.runId' metadata.json)" = "${previous_run_id}"
            test "$(jq -r '.commit' metadata.json)" = "${previous_commit}"
            test "$(unzip -p site.zip release.json | jq -r '.runId')" = "${previous_run_id}"
            test "$(unzip -p site.zip release.json | jq -r '.commit')" = "${previous_commit}"
          )
          echo "available=true" >> "${GITHUB_OUTPUT}"
          echo "run-id=${previous_run_id}" >> "${GITHUB_OUTPUT}"

      - name: Promote identical zip to production branch
        id: production
        env:
          AMPLIFY_APP_ID: ${{ vars.AMPLIFY_APP_ID }}
          AMPLIFY_BRANCH: ${{ vars.AMPLIFY_PRODUCTION_BRANCH }}
        run: ./scripts/amplify-deploy.sh "${AMPLIFY_APP_ID}" "${AMPLIFY_BRANCH}" release/site.zip

      - name: Verify production or restore previous artifact
        env:
          AMPLIFY_APP_ID: ${{ vars.AMPLIFY_APP_ID }}
          AMPLIFY_BRANCH: ${{ vars.AMPLIFY_PRODUCTION_BRANCH }}
          AMPLIFY_PRODUCTION_URL: ${{ vars.AMPLIFY_PRODUCTION_URL }}
          PRODUCTION_DOMAIN_ACTIVE: ${{ vars.PRODUCTION_DOMAIN_ACTIVE }}
          PREVIOUS_ARTIFACT_AVAILABLE: ${{ steps.previous.outputs.available }}
          PREVIOUS_RUN_ID: ${{ steps.previous.outputs.run-id }}
        shell: bash
        run: |
          set -euo pipefail
          set +e
          HOSTING_BASE_URL="${AMPLIFY_PRODUCTION_URL}" \
            HOSTING_EXPECT_AMPLIFY=1 \
            bun run test:hosting
          acceptance_status=$?
          if [[ "${PRODUCTION_DOMAIN_ACTIVE}" == "true" ]]; then
            HOSTING_BASE_URL="https://pauldiloreto.com/" \
              HOSTING_EXPECT_AMPLIFY=1 \
              HOSTING_EXPECT_DOMAIN_REDIRECTS=1 \
              bun run test:hosting
            domain_status=$?
            if [[ "${domain_status}" -ne 0 ]]; then
              acceptance_status="${domain_status}"
            fi
          else
            echo "Production-domain checks are intentionally skipped until DNS cutover is active."
          fi
          set -e

          if [[ "${acceptance_status}" -eq 0 ]]; then
            {
              echo "### Amplify deployment"
              echo "- Artifact SHA-256: \`${{ needs.quality.outputs.artifact-sha256 }}\`"
              echo "- Candidate job: \`${{ steps.candidate.outputs.job-id }}\`"
              echo "- Production job: \`${{ steps.production.outputs.job-id }}\`"
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          echo "Post-promotion production acceptance failed." >&2
          if [[ "${PREVIOUS_ARTIFACT_AVAILABLE}" != "true" ]]; then
            echo "No previous retained artifact exists, so automatic rollback is not possible." >&2
            exit 1
          fi

          rollback_output="$(mktemp)"
          trap 'rm -f "${rollback_output}"' EXIT
          env GITHUB_OUTPUT="${rollback_output}" \
            ./scripts/amplify-deploy.sh \
              "${AMPLIFY_APP_ID}" \
              "${AMPLIFY_BRANCH}" \
              previous-release/site.zip
          rollback_job_id="$(grep '^job-id=' "${rollback_output}" | tail -1 | cut -d= -f2-)"

          HOSTING_BASE_URL="${AMPLIFY_PRODUCTION_URL}" \
            HOSTING_EXPECT_AMPLIFY=1 \
            bun run test:hosting
          if [[ "${PRODUCTION_DOMAIN_ACTIVE}" == "true" ]]; then
            HOSTING_BASE_URL="https://pauldiloreto.com/" \
              HOSTING_EXPECT_AMPLIFY=1 \
              HOSTING_EXPECT_DOMAIN_REDIRECTS=1 \
              bun run test:hosting
          fi

          previous_hash="$(cut -d ' ' -f 1 previous-release/site.zip.sha256)"
          {
            echo "### Automatic Amplify rollback"
            echo "- Failed artifact SHA-256: \`${{ needs.quality.outputs.artifact-sha256 }}\`"
            echo "- Restored workflow run: \`${PREVIOUS_RUN_ID}\`"
            echo "- Restored artifact SHA-256: \`${previous_hash}\`"
            echo "- Rollback job: \`${rollback_job_id}\`"
            echo "- Recovery smoke checks: passed"
          } >> "${GITHUB_STEP_SUMMARY}"
          echo "Production was restored to the previous verified artifact; failing this run with rollback evidence." >&2
          exit 1
