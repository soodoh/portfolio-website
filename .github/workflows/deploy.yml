name: Validate and deploy static site

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Build and verify artifact
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    outputs:
      artifact-name: ${{ steps.package.outputs.artifact-name }}
      artifact-sha256: ${{ steps.package.outputs.artifact-sha256 }}
      release-attempt: ${{ steps.package.outputs.release-attempt }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Biome
        run: bun run lint

      - name: Run TypeScript
        run: bun run typecheck

      - name: Validate shell scripts
        run: |
          bash -n scripts/*.sh
          shellcheck scripts/*.sh

      - name: Validate GitHub Actions workflows
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.7

      - name: Validate CloudFormation
        run: pipx run --spec cfn-lint==1.42.0 cfn-lint infra/amplify-hosting.yaml

      - name: Build static site
        run: bun run build

      - name: Assert static output
        run: bun run test:static

      - name: Run functional and visual Playwright tests
        run: bun run test:e2e:static:prebuilt

      - name: Run Lighthouse CI
        run: bun run lighthouse

      - name: Package verified static artifact
        id: package
        shell: bash
        run: |
          set -euo pipefail
          artifact_name="verified-static-site-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          mkdir -p release
          jq -n \
            --arg runId "${GITHUB_RUN_ID}" \
            --arg runAttempt "${GITHUB_RUN_ATTEMPT}" \
            --arg commit "${GITHUB_SHA}" \
            '{runId: $runId, runAttempt: $runAttempt, commit: $commit}' \
            > dist/client/release.json
          find dist/client -type f -exec touch -t 198001010000 {} +
          (
            cd dist/client
            find . -type f -print | LC_ALL=C sort > "${RUNNER_TEMP}/static-files.txt"
            zip -X -q "${GITHUB_WORKSPACE}/release/site.zip" -@ < "${RUNNER_TEMP}/static-files.txt"
          )
          (
            cd release
            sha256sum site.zip > site.zip.sha256
          )
          artifact_sha256="$(cut -d ' ' -f 1 release/site.zip.sha256)"
          jq -n \
            --arg runId "${GITHUB_RUN_ID}" \
            --arg runAttempt "${GITHUB_RUN_ATTEMPT}" \
            --arg commit "${GITHUB_SHA}" \
            --arg sha256 "${artifact_sha256}" \
            '{runId: $runId, runAttempt: $runAttempt, commit: $commit, sha256: $sha256, deploymentRoot: "dist/client"}' \
            > release/metadata.json
          cp -R .lighthouseci/reports release/lighthouse-reports
          cp -R playwright-report release/playwright-report
          {
            printf 'artifact-name=%s\n' "${artifact_name}"
            printf 'artifact-sha256=%s\n' "${artifact_sha256}"
            printf 'release-attempt=%s\n' "${GITHUB_RUN_ATTEMPT}"
          } >> "${GITHUB_OUTPUT}"

      - name: Upload verified artifact and reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.package.outputs.artifact-name }}
          path: release/
          if-no-files-found: error
          retention-days: 90

  deploy:
    name: Verify candidate and promote
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - quality
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    environment: production
    concurrency:
      group: amplify-production-deployment
      cancel-in-progress: false
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download this run's verified artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.quality.outputs.artifact-name }}
          path: release

      - name: Verify artifact integrity
        run: |
          ./scripts/verify-release.sh \
            release \
            "${GITHUB_RUN_ID}" \
            "${{ needs.quality.outputs.release-attempt }}" \
            "${GITHUB_SHA}" \
            "${{ needs.quality.outputs.artifact-sha256 }}"

      - name: Configure AWS credentials through OIDC
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: portfolio-deploy-${{ github.run_id }}
          role-duration-seconds: 10800
          mask-aws-account-id: true

      - name: Deploy verified zip to candidate
        id: candidate
        env:
          AMPLIFY_APP_ID: ${{ vars.AMPLIFY_APP_ID }}
          AMPLIFY_BRANCH: ${{ vars.AMPLIFY_CANDIDATE_BRANCH }}
        run: ./scripts/amplify-deploy.sh "${AMPLIFY_APP_ID}" "${AMPLIFY_BRANCH}" release/site.zip

      - name: Smoke test candidate hosting
        run: |
          ./scripts/hosting-acceptance.sh \
            "${{ vars.AMPLIFY_CANDIDATE_URL }}" \
            "${GITHUB_RUN_ID}" \
            "${{ needs.quality.outputs.release-attempt }}" \
            "${GITHUB_SHA}"

      - name: Run Playwright acceptance against candidate
        env:
          PLAYWRIGHT_BASE_URL: ${{ vars.AMPLIFY_CANDIDATE_URL }}
          PLAYWRIGHT_EXPECT_STATIC_404: "1"
        run: bun run test:e2e

      - name: Run Lighthouse acceptance against candidate
        env:
          LHCI_URL: ${{ vars.AMPLIFY_CANDIDATE_URL }}
        run: bun run lighthouse

      - name: Locate currently deployed verified artifact
        id: previous
        env:
          AMPLIFY_PRODUCTION_URL: ${{ vars.AMPLIFY_PRODUCTION_URL }}
          VERIFIED_RELEASE_BUCKET: ${{ vars.AMPLIFY_RELEASE_BUCKET }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          release_marker="$(mktemp)"
          trap 'rm -f "${release_marker}"' EXIT
          if ! marker_status="$(curl \
            --silent \
            --show-error \
            --max-time 20 \
            --retry 3 \
            --retry-all-errors \
            --retry-delay 2 \
            --output "${release_marker}" \
            --write-out '%{http_code}' \
            "${AMPLIFY_PRODUCTION_URL%/}/release.json?run=${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}")"; then
            echo "Failed to query the deployed release marker." >&2
            exit 1
          fi
          if [[ "${marker_status}" == "404" ]]; then
            echo "No deployed release marker exists; this is the first baseline artifact."
            echo "available=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          if [[ "${marker_status}" != "200" ]]; then
            echo "Release marker returned HTTP ${marker_status}." >&2
            exit 1
          fi
          previous_run_id="$(jq -r '.runId' "${release_marker}")"
          previous_run_attempt="$(jq -r '.runAttempt' "${release_marker}")"
          previous_commit="$(jq -r '.commit' "${release_marker}")"
          [[ "${previous_run_id}" =~ ^[0-9]+$ ]]
          if [[ ! "${previous_run_attempt}" =~ ^[0-9]+$ ]]; then
            echo "Currently deployed run ${previous_run_id} predates immutable run-attempt releases."
            echo "available=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          [[ "${previous_commit}" =~ ^[0-9a-f]{40}$ ]]

          run="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${previous_run_id}")"
          test "$(jq -r '.head_branch' <<< "${run}")" = "main"
          test "$(jq -r '.event' <<< "${run}")" = "push"
          test "$(jq -r '.path' <<< "${run}")" = ".github/workflows/deploy.yml"
          test "$(jq -r '.head_sha' <<< "${run}")" = "${previous_commit}"

          set +e
          ./scripts/download-release.sh \
            "${VERIFIED_RELEASE_BUCKET}" \
            "${previous_run_id}" \
            "${previous_run_attempt}" \
            previous-release
          download_status=$?
          set -e
          if [[ "${download_status}" -eq 3 ]]; then
            echo "Currently deployed run ${previous_run_id} predates the verified release store."
            echo "available=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          if [[ "${download_status}" -ne 0 ]]; then
            exit "${download_status}"
          fi
          ./scripts/verify-release.sh \
            previous-release \
            "${previous_run_id}" \
            "${previous_run_attempt}" \
            "${previous_commit}"
          {
            echo "available=true"
            echo "run-id=${previous_run_id}"
            echo "run-attempt=${previous_run_attempt}"
          } >> "${GITHUB_OUTPUT}"

      - name: Store verified release for rollback
        env:
          VERIFIED_RELEASE_BUCKET: ${{ vars.AMPLIFY_RELEASE_BUCKET }}
        run: |
          release_store="s3://${VERIFIED_RELEASE_BUCKET}/releases/${GITHUB_RUN_ID}/${{ needs.quality.outputs.release-attempt }}"
          aws s3 cp release/site.zip "${release_store}/site.zip"
          aws s3 cp release/site.zip.sha256 "${release_store}/site.zip.sha256"
          aws s3 cp release/metadata.json "${release_store}/metadata.json"

      - name: Promote identical zip to production branch
        id: production
        continue-on-error: true
        env:
          AMPLIFY_APP_ID: ${{ vars.AMPLIFY_APP_ID }}
          AMPLIFY_BRANCH: ${{ vars.AMPLIFY_PRODUCTION_BRANCH }}
        run: ./scripts/amplify-deploy.sh "${AMPLIFY_APP_ID}" "${AMPLIFY_BRANCH}" release/site.zip

      - name: Verify production or restore previous artifact
        if: ${{ !cancelled() }}
        env:
          AMPLIFY_APP_ID: ${{ vars.AMPLIFY_APP_ID }}
          AMPLIFY_BRANCH: ${{ vars.AMPLIFY_PRODUCTION_BRANCH }}
          AMPLIFY_PRODUCTION_URL: ${{ vars.AMPLIFY_PRODUCTION_URL }}
          PRODUCTION_DOMAIN_ACTIVE: ${{ vars.PRODUCTION_DOMAIN_ACTIVE }}
          PREVIOUS_ARTIFACT_AVAILABLE: ${{ steps.previous.outputs.available }}
          PREVIOUS_RUN_ID: ${{ steps.previous.outputs.run-id }}
          PREVIOUS_RUN_ATTEMPT: ${{ steps.previous.outputs.run-attempt }}
          CURRENT_RUN_ID: ${{ github.run_id }}
          CURRENT_RUN_ATTEMPT: ${{ needs.quality.outputs.release-attempt }}
          CURRENT_COMMIT: ${{ github.sha }}
          PRODUCTION_DEPLOY_OUTCOME: ${{ steps.production.outcome }}
          PRODUCTION_JOB_RECONCILED: ${{ steps.production.outputs.job-reconciled }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${PRODUCTION_JOB_RECONCILED}" != "true" ]]; then
            echo "Production deployment job did not reach a terminal state; refusing to certify or roll back." >&2
            exit 1
          fi
          set +e
          ./scripts/hosting-acceptance.sh \
            "${AMPLIFY_PRODUCTION_URL}" \
            "${CURRENT_RUN_ID}" \
            "${CURRENT_RUN_ATTEMPT}" \
            "${CURRENT_COMMIT}"
          acceptance_status=$?
          if [[ "${PRODUCTION_DOMAIN_ACTIVE}" == "true" ]]; then
            ./scripts/hosting-acceptance.sh \
              "https://pauldiloreto.com/" \
              "${CURRENT_RUN_ID}" \
              "${CURRENT_RUN_ATTEMPT}" \
              "${CURRENT_COMMIT}" \
              1
            domain_status=$?
            if [[ "${domain_status}" -ne 0 ]]; then
              acceptance_status="${domain_status}"
            fi
          else
            echo "Production-domain checks are intentionally skipped until DNS cutover is active."
          fi
          set -e

          if [[ "${acceptance_status}" -eq 0 ]]; then
            {
              echo "### Amplify deployment"
              echo "- Artifact SHA-256: \`${{ needs.quality.outputs.artifact-sha256 }}\`"
              echo "- Candidate job: \`${{ steps.candidate.outputs.job-id }}\`"
              echo "- Production job: \`${{ steps.production.outputs.job-id }}\`"
            } >> "${GITHUB_STEP_SUMMARY}"
            if [[ "${PRODUCTION_DEPLOY_OUTCOME}" != "success" ]]; then
              echo "Production serves the expected release despite an ambiguous deployment-helper failure."
            fi
            exit 0
          fi

          echo "Post-promotion production acceptance failed." >&2
          if [[ "${PREVIOUS_ARTIFACT_AVAILABLE}" != "true" ]]; then
            echo "No previous retained artifact exists, so automatic rollback is not possible." >&2
            exit 1
          fi

          rollback_output="$(mktemp)"
          trap 'rm -f "${rollback_output}"' EXIT
          set +e
          env GITHUB_OUTPUT="${rollback_output}" \
            ./scripts/amplify-deploy.sh \
              "${AMPLIFY_APP_ID}" \
              "${AMPLIFY_BRANCH}" \
              previous-release/site.zip
          rollback_status=$?
          set -e
          rollback_job_id="$(grep '^job-id=' "${rollback_output}" | tail -1 | cut -d= -f2- || true)"
          rollback_reconciled="$(grep '^job-reconciled=' "${rollback_output}" | tail -1 | cut -d= -f2- || true)"
          if [[ "${rollback_reconciled}" != "true" ]]; then
            echo "Rollback deployment job did not reach a terminal state; refusing to certify recovery." >&2
            exit 1
          fi
          if [[ "${rollback_status}" -ne 0 ]]; then
            echo "Rollback helper failed; reconciling the served release identity." >&2
          fi

          previous_commit="$(jq -r '.commit' previous-release/metadata.json)"
          ./scripts/hosting-acceptance.sh \
            "${AMPLIFY_PRODUCTION_URL}" \
            "${PREVIOUS_RUN_ID}" \
            "${PREVIOUS_RUN_ATTEMPT}" \
            "${previous_commit}"
          if [[ "${PRODUCTION_DOMAIN_ACTIVE}" == "true" ]]; then
            ./scripts/hosting-acceptance.sh \
              "https://pauldiloreto.com/" \
              "${PREVIOUS_RUN_ID}" \
              "${PREVIOUS_RUN_ATTEMPT}" \
              "${previous_commit}" \
              1
          fi

          previous_hash="$(cut -d ' ' -f 1 previous-release/site.zip.sha256)"
          {
            echo "### Automatic Amplify rollback"
            echo "- Failed artifact SHA-256: \`${{ needs.quality.outputs.artifact-sha256 }}\`"
            echo "- Restored workflow run: \`${PREVIOUS_RUN_ID}\` attempt \`${PREVIOUS_RUN_ATTEMPT}\`"
            echo "- Restored artifact SHA-256: \`${previous_hash}\`"
            echo "- Rollback job: \`${rollback_job_id}\`"
            echo "- Recovery smoke checks: passed"
          } >> "${GITHUB_STEP_SUMMARY}"
          echo "Production was restored to the previous verified artifact; failing this run with rollback evidence." >&2
          exit 1
